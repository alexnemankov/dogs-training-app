<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кинология & Бихевиористика — Учебный план</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE7D8;
    --paper: #FAF7F2;
    --ink: #1C1814;
    --ink-muted: #6B6356;
    --ink-faint: #A39A8E;
    --amber: #C17B2A;
    --amber-light: #F5E6CC;
    --amber-pale: #FBF4E8;
    --green: #3A6B3E;
    --green-light: #D8ECD9;
    --red-light: #F5E0D8;
    --red: #A0402A;
    --border: rgba(92,76,56,0.15);
    --border-strong: rgba(92,76,56,0.3);
    --shadow: 0 2px 16px rgba(28,24,20,0.08);
    --shadow-sm: 0 1px 4px rgba(28,24,20,0.06);
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Layout */
  .shell { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--cream);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 10;
  }

  .sidebar-header {
    padding: 32px 24px 24px;
    border-bottom: 1px solid var(--border);
  }

  .app-title {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .app-subtitle {
    font-size: 12px;
    color: var(--ink-muted);
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  /* Progress in sidebar */
  .sidebar-progress {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label span:first-child {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    font-weight: 500;
  }

  .progress-label .prog-num {
    font-size: 13px;
    font-weight: 500;
    color: var(--amber);
  }

  .progress-track {
    height: 4px;
    background: var(--cream-dark);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Search */
  .sidebar-search {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faint);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 8px 12px 8px 32px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--ink-faint); }
  .search-input:focus { border-color: var(--amber); }

  /* Filters */
  .sidebar-filters {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .filter-pill {
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 500;
    border-radius: 99px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }

  .filter-pill:hover { background: var(--cream-dark); }
  .filter-pill.active {
    background: var(--amber);
    border-color: var(--amber);
    color: white;
  }

  /* Lesson list in sidebar */
  .lesson-nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .lesson-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 24px;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 3px solid transparent;
  }

  .lesson-nav-item:hover { background: var(--cream-dark); }

  .lesson-nav-item.active {
    background: var(--amber-light);
    border-left-color: var(--amber);
  }

  .lesson-nav-item.is-today {
    background: var(--amber-pale);
  }

  .lesson-nav-item.is-today.active {
    background: var(--amber-light);
    border-left-color: var(--amber);
  }

  .nav-check {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
  }

  .nav-check:hover { border-color: var(--amber); }

  .nav-check.done {
    background: var(--green);
    border-color: var(--green);
  }

  .nav-check.done::after {
    content: '';
    display: block;
    width: 8px;
    height: 5px;
    border-left: 1.5px solid white;
    border-bottom: 1.5px solid white;
    transform: rotate(-45deg) translate(0.5px, -0.5px);
  }

  .nav-title {
    font-size: 12px;
    color: var(--ink-muted);
    line-height: 1.4;
    flex: 1;
    min-width: 0;
  }

  .lesson-nav-item.active .nav-title { color: var(--ink); font-weight: 500; }
  .lesson-nav-item.is-today .nav-title { color: var(--amber); }
  .lesson-nav-item.is-today.active .nav-title { color: var(--amber); }

  .nav-num {
    font-size: 10px;
    color: var(--ink-faint);
    flex-shrink: 0;
    font-weight: 300;
  }

  /* Main content */
  .main {
    margin-left: 300px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .main-header {
    padding: 32px 48px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .date-display {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 300;
  }

  .today-btn {
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    border: 1px solid var(--amber);
    border-radius: 6px;
    background: transparent;
    color: var(--amber);
    cursor: pointer;
    transition: all 0.15s;
  }

  .today-btn:hover { background: var(--amber); color: white; }

  /* Lesson view */
  .lesson-view {
    padding: 32px 48px 64px;
    max-width: 780px;
  }

  .lesson-eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .lesson-num-badge {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .badge-dot { color: var(--border-strong); }

  .badge-today-tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    background: var(--amber-light);
    color: var(--amber);
    font-size: 11px;
    font-weight: 500;
    border-radius: 99px;
  }

  .badge-done-tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    background: var(--green-light);
    color: var(--green);
    font-size: 11px;
    font-weight: 500;
    border-radius: 99px;
  }

  .lesson-main-title {
    font-family: 'Lora', serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .lesson-date-line {
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 24px;
    font-weight: 300;
  }

  .lesson-desc-block {
    background: var(--cream);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 28px;
    border: 1px solid var(--border);
  }

  .lesson-desc-block p {
    font-size: 15px;
    color: var(--ink-muted);
    line-height: 1.75;
  }

  /* Key points */
  .key-points {
    margin-bottom: 28px;
  }

  .key-points-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .key-point {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    align-items: flex-start;
  }

  .key-point-dot {
    width: 6px;
    height: 6px;
    background: var(--amber);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 8px;
  }

  .key-point p {
    font-size: 14px;
    color: var(--ink-muted);
    line-height: 1.6;
  }

  /* Actions */
  .lesson-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary:hover { background: var(--amber); }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-secondary:hover { border-color: var(--amber); color: var(--amber); }
  .btn-secondary.done-btn { border-color: var(--green); color: var(--green); background: var(--green-light); }
  .btn-secondary.done-btn:hover { background: var(--green); color: white; }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 32px 0;
  }

  /* Prev / Next */
  .lesson-nav-arrows {
    display: flex;
    gap: 12px;
  }

  .nav-arrow {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    background: transparent;
    color: var(--ink-muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
    max-width: 220px;
    text-align: left;
  }

  .nav-arrow:hover { border-color: var(--ink); color: var(--ink); }
  .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-arrow span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Welcome state */
  .welcome {
    padding: 32px 48px 64px;
    max-width: 680px;
  }

  .welcome h2 {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--ink);
  }

  .welcome p {
    font-size: 15px;
    color: var(--ink-muted);
    line-height: 1.75;
    margin-bottom: 24px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-num {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--amber);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--ink-muted);
    font-weight: 400;
  }

  /* Tag pills for sections */
  .section-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 24px;
    margin-top: 4px;
  }

  .tag-behavior { background: #E8F0F5; color: #2A5A7C; }
  .tag-training { background: #F0ECF8; color: #5A3A8C; }
  .tag-physiology { background: #EDF5EC; color: #2E6B35; }
  .tag-life { background: #F5EDE8; color: #8C4A2E; }
  .tag-search { background: #F5F0E0; color: #8C7A2E; }
  .tag-puppies { background: #F8EBF0; color: #8C2E5A; }

  /* Scrollbar */
  .lesson-nav::-webkit-scrollbar { width: 4px; }
  .lesson-nav::-webkit-scrollbar-track { background: transparent; }
  .lesson-nav::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { width: 100%; position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .shell { flex-direction: column; }
    .main { margin-left: 0; }
    .lesson-view, .welcome, .main-header { padding: 24px; }
    .lesson-main-title { font-size: 24px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .lesson-nav { max-height: 200px; }
  }

  /* Animations */
  .lesson-view, .welcome { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-title">Кинология &amp;<br>Бихевиористика</div>
      <div class="app-subtitle">Учебный план · 108 занятий</div>
    </div>

    <div class="sidebar-progress">
      <div class="progress-label">
        <span>Прогресс</span>
        <span class="prog-num" id="prog-text">0 / 108</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="sidebar-search">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" id="search-input" placeholder="Поиск по темам…">
      </div>
    </div>

    <div class="sidebar-filters">
      <button class="filter-pill active" data-filter="all">Все</button>
      <button class="filter-pill" data-filter="today">Сегодня</button>
      <button class="filter-pill" data-filter="upcoming">Впереди</button>
      <button class="filter-pill" data-filter="done">Пройдено</button>
    </div>

    <nav class="lesson-nav" id="lesson-nav"></nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <div class="date-display" id="date-display"></div>
      <button class="today-btn" onclick="goToday()">← Сегодня</button>
    </div>

    <div id="content-area"></div>
  </main>

</div>

<script>
const START_DATE = new Date('2026-04-02');

const LESSONS = [
  {title:"Основы работы с поведением. Организация курса",desc:"Введение в курс: цели обучения, структура программы, ключевые принципы работы с поведением собак.",points:["Что такое поведение с научной точки зрения","Как устроена программа курса","Цели и ожидаемые результаты","Ключевые понятия кинологии и бихевиористики"],tag:"behavior"},

  {title:"Иерархия: мифы и современные знания",desc:"Разбор теории доминирования, почему «вожак стаи» — устаревший миф, современный взгляд на отношения собака–человек.",points:["История теории доминирования и её критика","Исследования Меха: почему стая ≠ иерархия","Современный взгляд на отношения человек–собака","Практические последствия отказа от доминирования"],tag:"behavior"},
  {title:"Когнитивные способности собак",desc:"Память, решение задач, социальное познание, понимание жестов и эмоций человека.",points:["Рабочая и долгосрочная память собак","Решение задач и инсайт","Понимание жестов и взгляда человека","Социальные когниции: исследования и выводы"],tag:"behavior"},

  {title:"Коммуникация собак. Правила взаимодействия",desc:"Как собаки общаются между собой: дистанция, ритуалы, правила встречи и разрешения конфликтов.",points:["Зоны комфорта и личное пространство","Ритуалы приветствия между собаками","Правила разрешения конфликтов","Когда общение переходит в конфликт"],tag:"behavior"},
  {title:"Язык тела в общении с сородичами и человеком",desc:"Позы, движения, мимика — что они означают, как читать язык тела в разных контекстах.",points:["Позы тела: подчинение, уверенность, напряжение","Сигналы хвоста, ушей, шерсти","Мимика: взгляд, оскал, расслабление","Контекст как ключ к интерпретации"],tag:"behavior"},

function saveDone() {
  localStorage.setItem('dog_done', JSON.stringify([...done]));
}

function todayIndex() {
  const diff = new Date() - START_DATE;
  return Math.min(Math.max(0, Math.floor(diff / 86400000)), LESSONS.length - 1);
}

function lessonDate(i) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + i);
  return d;
}

function formatDate(d) {
  return d.toLocaleDateString('ru-RU', {day: 'numeric', month: 'long', year: 'numeric'});
}

function renderProgress() {
  const pct = Math.round(done.size / LESSONS.length * 100);
  document.getElementById('prog-text').textContent = done.size + ' / ' + LESSONS.length;
  document.getElementById('prog-fill').style.width = pct + '%';
}

  LESSONS.forEach((l, i) => {
    if (q && !l.title.toLowerCase().includes(q)) return;
    const isDone = done.has(i);
    const isToday = i === ti;
    if (activeFilter === 'today' && !isToday) return;
    if (activeFilter === 'done' && !isDone) return;
    if (activeFilter === 'upcoming' && (isDone || i < ti)) return;

    const item = document.createElement('div');
    item.className = 'lesson-nav-item' + (i === activeIdx ? ' active' : '') + (isToday ? ' is-today' : '');
    item.innerHTML = `
      <div class="nav-num">${String(i+1).padStart(2,'0')}</div>
      <div class="nav-title">${l.title}</div>
      <div class="nav-check ${isDone ? 'done' : ''}" data-i="${i}"></div>
    `;
    item.addEventListener('click', e => {
      if (e.target.closest('.nav-check')) return;
      selectLesson(i);
    });
    item.querySelector('.nav-check').addEventListener('click', e => {
      e.stopPropagation();
      toggleDone(i);
    });
    nav.appendChild(item);
  });
}

function toggleDone(i) {
  if (done.has(i)) done.delete(i); else done.add(i);
  saveDone();
  renderProgress();
  renderNav();
  if (activeIdx === i) renderContent();
}

function selectLesson(i) {
  activeIdx = i;
  renderNav();
  renderContent();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goToday() {
  selectLesson(todayIndex());
  setTimeout(() => {
    const active = document.querySelector('.lesson-nav-item.active');
    if (active) active.scrollIntoView({behavior: 'smooth', block: 'center'});
  }, 100);
}

function renderContent() {
  const area = document.getElementById('content-area');
  const ti = todayIndex();

  if (activeIdx === null) {
    // Welcome screen
    area.innerHTML = `
      <div class="welcome">
        <h2>Добро пожаловать в курс</h2>
        <p>Учебный план рассчитан на 108 занятий — по одной теме в день. Каждый день открывай нужную тему, изучай материал и отмечай как пройденное. Занятие дня: <strong>${LESSONS[ti].title}</strong>.</p>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num">${LESSONS.length}</div><div class="stat-label">всего занятий</div></div>
          <div class="stat-card"><div class="stat-num">${done.size}</div><div class="stat-label">пройдено</div></div>
          <div class="stat-card"><div class="stat-num">${ti + 1}</div><div class="stat-label">занятие сегодня</div></div>
        </div>
        <button class="btn-primary" onclick="goToday()">Открыть занятие дня →</button>
      </div>`;
    return;
  }

  const l = LESSONS[activeIdx];
  const isToday = activeIdx === ti;
  const isDone = done.has(activeIdx);
  const date = lessonDate(activeIdx);
  const tag = TAG_MAP[l.tag] || TAG_MAP.behavior;
  const pts = (l.points || []).map(p => `<div class="key-point"><div class="key-point-dot"></div><p>${p}</p></div>`).join('');

  const todayBadge = isToday ? '<span class="badge-today-tag">Сегодня</span>' : '';
  const doneBadge = isDone ? '<span class="badge-done-tag">✓ Пройдено</span>' : '';

  area.innerHTML = `
    <div class="lesson-view">
      <div class="lesson-eyebrow">
        <span class="lesson-num-badge">Занятие ${activeIdx + 1} из ${LESSONS.length}</span>
        ${todayBadge ? '<span class="badge-dot">·</span>' + todayBadge : ''}
        ${doneBadge ? '<span class="badge-dot">·</span>' + doneBadge : ''}
      </div>
      <h1 class="lesson-main-title">${l.title}</h1>
      <div class="lesson-date-line">${formatDate(date)}</div>
      <span class="section-tag ${tag.cls}">${tag.label}</span>
      <div class="lesson-desc-block"><p>${l.desc}</p></div>
      ${pts ? `<div class="key-points"><div class="key-points-title">Ключевые темы занятия</div>${pts}</div>` : ''}
      <div class="lesson-actions">
        <button class="btn-secondary done-btn${isDone ? ' done-btn' : ''}" onclick="toggleDone(${activeIdx})">
          ${isDone ? '✓ Отметить как непройденное' : 'Отметить как пройденное'}
        </button>
      </div>
      <div class="divider"></div>
      <div class="lesson-nav-arrows">
        <button class="nav-arrow" onclick="selectLesson(${activeIdx - 1})" ${activeIdx === 0 ? 'disabled' : ''}>
          ← <span>${activeIdx > 0 ? 'Занятие ' + activeIdx + ': ' + LESSONS[activeIdx-1].title : ''}</span>
        </button>
        <button class="nav-arrow" onclick="selectLesson(${activeIdx + 1})" ${activeIdx === LESSONS.length-1 ? 'disabled' : ''}>
          <span>${activeIdx < LESSONS.length-1 ? 'Занятие ' + (activeIdx+2) + ': ' + LESSONS[activeIdx+1].title : ''}</span> →
        </button>
      </div>
    </div>`;
}

function updateDateDisplay() {
  document.getElementById('date-display').textContent = formatDate(new Date());
}

// Init
document.getElementById('search-input').addEventListener('input', renderNav);
document.querySelectorAll('.filter-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderNav();
  });
});

updateDateDisplay();
renderProgress();
renderNav();
renderContent();

// Auto-select today on load
setTimeout(() => {
  selectLesson(todayIndex());
  const active = document.querySelector('.lesson-nav-item.active');
  if (active) active.scrollIntoView({block: 'center'});
}, 100);
</script>
</body>
</html>
